version: "3.9"

services:
  parcel-backend:
    build:
      network: host
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: parcel_backend_dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./.env.dev
    environment:
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      - parcel-mongodb
    restart: unless-stopped

  parcel-frontend:
    build:
      network: host
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: parcel_frontend_dev
    ports:
      - "5173:4173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./.env.dev
    depends_on:
      - parcel-backend
    restart: unless-stopped

  parcel-mongodb:
    image: mongo:7
    container_name: parcel_mongodb
    ports:
      - "27017"
    volumes:
      - mongo_data:/data/db
    env_file:
      - ./.env.dev
    restart: unless-stopped
  parcel-redis:
    image: redis:7-alpine
    container_name: parcel_redis
    ports:
      - "6379"
    volumes:
      - redis_data:/data
    env_file:
      - ./.env.dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  mongo_data:
  redis_data:
